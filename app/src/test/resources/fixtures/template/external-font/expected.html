<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>
<style>
@page { size: 210mm 297mm; margin: 20mm 20mm 20mm 25mm; }
@font-face { font-family: 'Lobster'; src: url("https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/lobster/Lobster-Regular.ttf") format("truetype"); font-weight: 400; font-style: normal; }
body { font-family: 'Liberation Sans'; color: #111827; line-height: 1.35; }
img, svg { max-width: 100%; height: auto; }
p { margin: 0 0 2mm; }
h1, h2, h3, h4, h5, h6 { margin: 0 0 3mm; line-height: 1.12; color: #111827; }
.key-value { width: 100%; border-collapse: collapse; margin: 0 0 2mm; }
.key-value td { vertical-align: top; padding: 0 0 2mm; }
.key-value td:first-child { font-weight: 600; color: #374151; padding-right: 4mm; }
.row { width: 100%; border-collapse: collapse; margin: 0 0 4mm; }
.row > tbody > tr > td, .row > tr > td { vertical-align: top; padding: 0; }
body { font-family: 'Inter'; }
.block-1 { font-family: 'Lobster'; font-size: 36pt; }

</style>
</head>
<body>
<table class="row" role="presentation"><tr><td><div class="block-1"><p>Special Offer</p></div></td></tr></table><table class="row" role="presentation"><tr><td><div class="block-2"><p>Everything else uses the bundled Inter body font.</p></div></td></tr></table>
</body>
</html>
