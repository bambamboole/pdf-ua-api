<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>
<style>
@page { size: A4; margin: 20mm 20mm 20mm 25mm; } @page { @bottom-center { content: counter(page) " / " counter(pages); font-size: 8pt; color: #9ca3af; } }
body { font-family: 'Liberation Sans'; color: #111827; line-height: 1.35; }
p { margin: 0 0 2mm; }
h1, h2, h3, h4, h5, h6 { margin: 0 0 3mm; line-height: 1.12; color: #111827; }
.row { width: 100%; border-collapse: collapse; margin: 0 0 4mm; }
.row > tbody > tr > td, .row > tr > td { vertical-align: top; padding: 0; }
</style>
</head>
<body>
<table class="row" role="presentation"><tr><td><div class="block-1"><h1>Welcome</h1></div></td></tr></table><table class="row" role="presentation"><tr><td><div class="block-2"><p>Dear customer,</p><p>Thank you for your order.</p><p>Best regards</p></div></td></tr></table>
</body>
</html>
