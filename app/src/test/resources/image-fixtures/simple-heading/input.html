<!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Heading</title>
    <style>
        body {
            font-family: 'Liberation Sans', Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
            font-size: 32px;
        }
        p {
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <p>This is a simple rendering test.</p>
</body>
</html>
