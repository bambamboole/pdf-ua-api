<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styled Content</title>
    <style>
        body {
            font-family: 'Liberation Serif', 'Times New Roman', serif;
            margin: 30px;
            background-color: #fafafa;
        }
        h1 {
            color: #1a5276;
            border-bottom: 3px solid #2980b9;
            padding-bottom: 8px;
            font-size: 28px;
        }
        .highlight {
            background-color: #f9e79f;
            padding: 10px;
            border-left: 4px solid #f1c40f;
            margin: 15px 0;
        }
        ul {
            color: #2c3e50;
        }
        li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Styled Content Test</h1>
    <div class="highlight">
        <strong>Note:</strong> This tests styled rendering with borders and backgrounds.
    </div>
    <ul>
        <li>First item with serif font</li>
        <li>Second item with consistent styling</li>
        <li>Third item to verify list rendering</li>
    </ul>
</body>
</html>
