ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ bambamboole.pdfua.ApplicationKt.module ]
    }
    # Request size limit: 10MB for HTML content
    server {
        maxRequestSize = 10485760
    }
}

# API Configuration
api {
    # Optional API key for authentication
    # If not set, API runs in public mode without authentication
    key = ${?API_KEY}
}

# UI Configuration
ui {
    # Enable or disable web UI (default: true)
    # Set WEB_UI_ENABLED=false to run in API-only mode
    enabled = true
    enabled = ${?WEB_UI_ENABLED}
}

# PDF Configuration
pdf {
    # PDF producer metadata (default: pdf-ua-api.com)
    producer = "pdf-ua-api.com"
    producer = ${?PDF_PRODUCER}

    # Maximum request size in bytes (default: 10MB)
    maxRequestSize = 10485760
    maxRequestSize = ${?MAX_REQUEST_SIZE}
}

# Asset Fetching Configuration
assets {
    timeout = 5000
    timeout = ${?ASSET_TIMEOUT}
    maxSize = 5242880
    maxSize = ${?ASSET_MAX_SIZE}
    allowedDomains = ${?ASSET_ALLOWED_DOMAINS}
}

# Rate Limiting Configuration
rateLimit {
    # Enable or disable rate limiting (default: true)
    enabled = true
    enabled = ${?RATE_LIMIT_ENABLED}

    # Max requests per client IP per window (default: 20)
    perIp = 20
    perIp = ${?RATE_LIMIT_PER_IP}

    # Max requests across the whole instance per window (default: 200)
    global = 200
    global = ${?RATE_LIMIT_GLOBAL}

    # Refill window in seconds for both buckets (default: 60)
    windowSeconds = 60
    windowSeconds = ${?RATE_LIMIT_WINDOW_SECONDS}

    # Trust X-Forwarded-* headers to resolve the client IP (default: false).
    # Only enable when running behind a trusted reverse proxy, otherwise the
    # client IP can be spoofed. See https://ktor.io/docs/server-forward-headers.html
    trustForwardedFor = false
    trustForwardedFor = ${?RATE_LIMIT_TRUST_FORWARDED_FOR}
}

# Logging Configuration
logging {
    # Log level: DEBUG, INFO, WARN, ERROR (default: INFO)
    level = "INFO"
    level = ${?LOG_LEVEL}
    # Log format: text or json (default: text)
    format = "text"
    format = ${?LOG_FORMAT}
}
