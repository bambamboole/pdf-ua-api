ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ bambamboole.pdfua.ApplicationKt.module ]
    }
    # Request size limit: 10MB for HTML content
    server {
        maxRequestSize = 10485760
    }
}

# API Configuration
api {
    # Optional API key for authentication
    # If not set, API runs in public mode without authentication
    key = ${?API_KEY}
}

# UI Configuration
ui {
    # Enable or disable web UI (default: true)
    # Set WEB_UI_ENABLED=false to run in API-only mode
    enabled = true
    enabled = ${?WEB_UI_ENABLED}
}

# PDF Configuration
pdf {
    # PDF producer metadata (default: pdf-ua-api.com)
    producer = "pdf-ua-api.com"
    producer = ${?PDF_PRODUCER}

    # Maximum request size in bytes (default: 10MB)
    maxRequestSize = 10485760
    maxRequestSize = ${?MAX_REQUEST_SIZE}
}

# Asset Fetching Configuration
assets {
    timeout = 5000
    timeout = ${?ASSET_TIMEOUT}
    maxSize = 5242880
    maxSize = ${?ASSET_MAX_SIZE}
    allowedDomains = ${?ASSET_ALLOWED_DOMAINS}
}

# Document Upload Configuration
# When a request sends an X-Upload-Url header, the generated document is PUT to that
# presigned URL instead of being returned in the response body.
upload {
    # Enable or disable the X-Upload-Url upload feature (default: true)
    enabled = true
    enabled = ${?UPLOAD_ENABLED}

    # Upload request timeout in milliseconds (default: 30000)
    timeout = 30000
    timeout = ${?UPLOAD_TIMEOUT}

    # Optional comma-separated allowlist of upload target hosts.
    # Empty means any public host is allowed (private/loopback addresses are always blocked).
    allowedDomains = ${?UPLOAD_ALLOWED_DOMAINS}
}

# Logging Configuration
logging {
    # Log level: DEBUG, INFO, WARN, ERROR (default: INFO)
    level = "INFO"
    level = ${?LOG_LEVEL}
    # Log format: text or json (default: text)
    format = "text"
    format = ${?LOG_FORMAT}
}
