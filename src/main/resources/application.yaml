ktor:
  deployment:
    port: "$PORT:8080"
  application:
    modules:
      - bambamboole.pdfua.ApplicationKt.bootstrap
      - bambamboole.pdfua.PluginsKt.logging
      - bambamboole.pdfua.PluginsKt.serialization
      - bambamboole.pdfua.PluginsKt.statusPages
      - bambamboole.pdfua.PluginsKt.cors
      - bambamboole.pdfua.PluginsKt.rateLimit
      - bambamboole.pdfua.PluginsKt.auth
      - bambamboole.pdfua.PluginsKt.swagger
      - bambamboole.pdfua.http.controller.HealthKt.health
      - bambamboole.pdfua.http.controller.TemplateSchemaKt.templateSchema
      - bambamboole.pdfua.http.controller.ConvertKt.convert
      - bambamboole.pdfua.http.controller.RenderKt.render
      - bambamboole.pdfua.http.controller.ValidationKt.validation
      - bambamboole.pdfua.http.controller.ConvertAndValidateKt.convertAndValidate
      - bambamboole.pdfua.http.controller.RenderImageKt.renderImage
      - bambamboole.pdfua.http.controller.IdentifyKt.identify
  server:
    maxRequestSize: 10485760

api:
  key: "$API_KEY:"

jwt:
  issuer: "$JWT_ISSUER:"
  jwksUrl: "$JWT_JWKS_URL:"
  audience: "$JWT_AUDIENCE:"

cors:
  allowedOrigins: "$CORS_ALLOWED_ORIGINS:"

pdf:
  producer: "$PDF_PRODUCER:pdf-ua-api.com"
  maxRequestSize: "$MAX_REQUEST_SIZE:10485760"

assets:
  timeout: "$ASSET_TIMEOUT:5000"
  maxSize: "$ASSET_MAX_SIZE:5242880"
  allowedDomains: "$ASSET_ALLOWED_DOMAINS:"

upload:
  enabled: "$UPLOAD_ENABLED:true"
  timeout: "$UPLOAD_TIMEOUT:30000"
  allowedDomains: "$UPLOAD_ALLOWED_DOMAINS:"

rateLimit:
  enabled: "$RATE_LIMIT_ENABLED:true"
  perIp: "$RATE_LIMIT_PER_IP:20"
  global: "$RATE_LIMIT_GLOBAL:200"
  windowSeconds: "$RATE_LIMIT_WINDOW_SECONDS:60"
  trustForwardedFor: "$RATE_LIMIT_TRUST_FORWARDED_FOR:false"

logging:
  level: "$LOG_LEVEL:INFO"
  format: "$LOG_FORMAT:text"

