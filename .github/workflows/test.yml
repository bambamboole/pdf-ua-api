name: Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '24'

    - uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: '9.1.0'

    - name: Check code quality
      run: ./gradlew spotlessCheck detekt --no-daemon

    - name: Run tests
      run: ./gradlew test --no-daemon
      env:
        JAVA_TOOL_OPTIONS: '--enable-native-access=ALL-UNNAMED'

    - name: Upload failure reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-failures
        path: |
          build/reports/spotless/
          app/build/reports/detekt/
          app/src/test/resources/fixtures/**/generated.*
          app/src/test/resources/fixtures/**/*diff*.png
          app/src/test/resources/fixtures/**/diff.*
          app/build/reports/tests/test/
        if-no-files-found: ignore
        retention-days: 14
