<!DOCTYPE html>
<html lang="en">
<head>
    <title>Welcome Letter</title>
    <meta name="subject" content="Onboarding welcome letter"/>
    <meta name="author" content="PDF UA API Benchmark"/>
    <meta name="description" content="A short single-page welcome letter"/>
    <style>
        body { font-family: 'Liberation Sans', Arial, sans-serif; margin: 40px; color: #222; }
        h1 { color: #2c3e50; }
        p { line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Welcome Aboard</h1>
    <p>Thank you for joining us. This short letter exists to exercise a minimal
       single-page document through both PDF engines.</p>
    <p>It contains only a heading and a couple of paragraphs so the conversion
       cost is dominated by engine startup and PDF assembly rather than content.</p>
</body>
</html>
